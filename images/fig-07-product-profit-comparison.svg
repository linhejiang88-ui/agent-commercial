<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .bg{fill:#f7f8fb}.title{font:700 42px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#152033}
      .sub{font:400 20px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#5a667a}
      .axis{font:400 16px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#64748b}
      .label{font:700 20px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#152033}
      .text{font:400 17px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#475569}
    </style>
  </defs>
  <rect class="bg" width="1400" height="900"/>
  <text class="title" x="80" y="85">不同业务类型的客单价、周期与毛利率对比</text>
  <text class="sub" x="80" y="124">横轴为典型交付周期，纵轴为毛利率区间中位数，气泡大小表示客单价中位数。</text>

  <g transform="translate(160 190)">
    <rect x="0" y="0" width="980" height="540" rx="16" fill="#fff" stroke="#d9e2ec"/>
    <line x1="90" y1="460" x2="910" y2="460" stroke="#cbd5e1"/>
    <line x1="90" y1="60" x2="90" y2="460" stroke="#cbd5e1"/>
    <line x1="90" y1="360" x2="910" y2="360" stroke="#e2e8f0"/>
    <line x1="90" y1="260" x2="910" y2="260" stroke="#e2e8f0"/>
    <line x1="90" y1="160" x2="910" y2="160" stroke="#e2e8f0"/>
    <text class="axis" x="70" y="465" text-anchor="end">30%</text>
    <text class="axis" x="70" y="365" text-anchor="end">40%</text>
    <text class="axis" x="70" y="265" text-anchor="end">50%</text>
    <text class="axis" x="70" y="165" text-anchor="end">60%</text>
    <text class="axis" x="90" y="500" text-anchor="middle">0.5 月</text>
    <text class="axis" x="360" y="500" text-anchor="middle">1 月</text>
    <text class="axis" x="635" y="500" text-anchor="middle">2 月</text>
    <text class="axis" x="910" y="500" text-anchor="middle">3 月</text>

    <circle cx="770" cy="275" r="76" fill="#2563eb" opacity="0.82"/>
    <text class="label" x="770" y="268" text-anchor="middle" fill="#fff">软件开发</text>
    <text class="text" x="770" y="296" text-anchor="middle" fill="#fff">8-30 万</text>

    <circle cx="430" cy="235" r="58" fill="#7c3aed" opacity="0.84"/>
    <text class="label" x="430" y="230" text-anchor="middle" fill="#fff">数据分析</text>
    <text class="text" x="430" y="258" text-anchor="middle" fill="#fff">3-15 万</text>

    <circle cx="510" cy="160" r="92" fill="#0f766e" opacity="0.86"/>
    <text class="label" x="510" y="154" text-anchor="middle" fill="#fff">AI Agent</text>
    <text class="text" x="510" y="183" text-anchor="middle" fill="#fff">5-50 万 + 订阅</text>

    <circle cx="360" cy="160" r="70" fill="#f97316" opacity="0.86"/>
    <text class="label" x="360" y="154" text-anchor="middle" fill="#fff">AI 咨询</text>
    <text class="text" x="360" y="183" text-anchor="middle" fill="#fff">2-20 万 + 月费</text>
  </g>

  <g transform="translate(1180 260)">
    <rect width="150" height="300" rx="14" fill="#fff" stroke="#d9e2ec"/>
    <circle cx="35" cy="55" r="14" fill="#2563eb"/><text class="text" x="60" y="62">软件开发</text>
    <circle cx="35" cy="110" r="14" fill="#7c3aed"/><text class="text" x="60" y="117">数据分析</text>
    <circle cx="35" cy="165" r="14" fill="#0f766e"/><text class="text" x="60" y="172">AI Agent</text>
    <circle cx="35" cy="220" r="14" fill="#f97316"/><text class="text" x="60" y="227">AI 咨询</text>
  </g>

  <text class="axis" x="80" y="815">数据来自主报告产品量级与盈利对比表。气泡图使用区间中位数，仅用于机会相对比较。</text>
</svg>
